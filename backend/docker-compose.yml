version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AdPhotoManager;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
      - Jwt__SecretKey=your-secret-key-min-32-characters-long
      - Jwt__Issuer=AdPhotoManager
      - Jwt__Audience=AdPhotoManager
      - Jwt__ExpirationMinutes=60
      - ActiveDirectory__Server=your-ad-server.com
      - ActiveDirectory__Port=389
      - ActiveDirectory__UseSsl=false
      - ActiveDirectory__ServiceAccount=CN=Service Account,OU=Users,DC=domain,DC=com
      - ActiveDirectory__ServicePassword=YourServicePassword
      - ActiveDirectory__BaseDn=DC=domain,DC=com
      - ActiveDirectory__AllowedOrganizations__0=IT Department
      - ActiveDirectory__AllowedOrganizations__1=HR Department
    volumes:
      - ./logs:/app/logs
    networks:
      - adphoto-network
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: ${SQLSERVER_PLATFORM:-linux/amd64}
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - adphoto-network

networks:
  adphoto-network:
    driver: bridge

volumes:
  sqlserver-data:
